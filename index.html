<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYLUCKYROULETTE — Analizador de Estrategias</title>
    <meta name="description" content="Analizador de estrategias para ruleta europea con Target Strategy, Dealer Signature y Travel Data." />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="pro-dashboard app-layout">
    <!-- ════════ SIDEBAR (Vertical Nav) ════════ -->
    <aside class="sidebar">
        <div class="brand">
            <div class="logo-icon">🎯</div>
            <div class="brand-text">ROULETTE<span>PRO v3.1</span></div>
        </div>
        
        <div class="settings-drawer-pro" style="padding:0 20px 20px; border-bottom:1px solid var(--border);">
            <div class="drawer-header" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; opacity:0.7;" onclick="toggleSettings()">
                <div style="font-size:0.6rem; text-transform:uppercase; color:var(--text-dim); letter-spacing:1px;">Dashboard Settings</div>
                <div id="settings-arrow" style="color:var(--gold); font-size:0.6rem; transition:transform 0.3s;">▼</div>
            </div>
            <div id="settings-content" style="display:none; margin-top:10px;">
                <div style="font-size:0.65rem; color:var(--text-dim); font-style:italic;">Advanced configuration enabled.</div>
            </div>
        </div>

        <nav class="nav-links" style="margin-top:20px;">
            <button class="nav-item active" data-view="dashboard">🏠 Dashboard</button>
            <button class="nav-item" data-view="agents">👥 Agents</button>
            <button class="nav-item" data-view="analysis">📈 Analysis</button>
            <button class="nav-item" data-view="settings">⚙ Settings</button>
        </nav>
        <div class="sidebar-footer">
            <div id="table-spin-count" class="status-pill" style="color:var(--text-dim); font-size:0.7rem;">Spins: 0</div>
        </div>
    </aside>

    <!-- ════════ MAIN CONTENT ════════ -->
    <main class="main-view">
        <header class="top-bar">
            <div class="top-left">
                <div class="breadcrumb">Active Agent: <span id="active-agent-name" style="color:var(--gold);">N17</span></div>
                <div id="history-strip" class="history-strip-top"></div>
            </div>
            <div class="clock" id="live-clock">00:00:00</div>
        </header>

        <div class="dashboard-content">
            <!-- AGENT TABS (Unified Header) -->
            <div class="ia-tabs-strip-pro" id="strat-tabs"></div>

            <!-- ACTIVE SIGNAL AREA (High Impact) -->
            <div id="active-signal-container" class="signal-banner-pro">
                <div class="signal-idle">⚡ WAITING FOR SPIN DATA...</div>
            </div>

            <!-- TRAVEL DATA (Primary) -->
            <section class="panel travel-panel-pro">
                <div class="panel-header" style="padding:10px 15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.75rem; letter-spacing:1px; font-weight:700;">TRAVEL DATA - DETAILED SPIN HISTORY</span>
                    <div class="table-actions" style="display:flex; gap:10px;">
                        <select id="table-select" class="pro-select" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; border-radius:4px; padding:2px 8px; font-size:0.7rem;"></select>
                        <button id="clear-table-btn" class="pro-btn btn-danger" style="background:rgba(255,59,92,0.1); color:var(--red); border:1px solid var(--red); padding:2px 8px; font-size:0.7rem; border-radius:4px;">🗑 Clear</button>
                    </div>
                </div>
                <div class="table-container-pro" id="travel-content" style="height:400px; overflow-y:auto; padding:0 15px;">
                    <table class="pro-table">
                        <thead>
                            <tr>
                                <th>N</th>
                                <th>NUMBER</th>
                                <th>DISTANCE</th>
                                <th>DIR</th>
                                <th>PHASE</th>
                            </tr>
                        </thead>
                        <tbody id="travel-tbody"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- ════════ VISUAL SIDEBAR (Right - Wheel Only) ════════ -->
    <aside class="visual-panel" style="background:var(--sidebar-bg); border-left:1px solid var(--border); display:flex; flex-direction:column; align-items:center;">
        <div class="wheel-container" style="padding:40px 20px; text-align:center;">
            <canvas id="wheel-canvas" width="220" height="220"></canvas>
            <div style="margin-top:20px; font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px;">Live Cylinder</div>
        </div>
        <div id="status-msg" class="status-banner" style="margin-top:auto; padding:20px; font-size:0.65rem; color:var(--accent); text-align:center; opacity:0.4;">System Online</div>
    </aside>
</div>

<!-- Add table modal -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:1000; align-items:center; justify-content:center;">
    <div class="glass" style="padding:24px; min-width:300px; max-width:380px; border-radius:12px; background:#070c2a; border:1px solid #4a7cff44;">
        <h2 style="color:#f5c842; font-size:1rem; margin-bottom:16px;">Nueva Mesa</h2>
        <label style="color:#5b6ea8; font-size:0.72rem;">Nombre *</label>
        <input id="modal-name" class="num-input" type="text" placeholder="Ej: Betano Mesa 2" style="width:100%; margin-bottom:10px; text-align:left; font-size:1rem;" />
        <label style="color:#5b6ea8; font-size:0.72rem;">Proveedor</label>
        <input id="modal-provider" class="num-input" type="text" placeholder="Evolution / Playtech / Otro" style="width:100%; margin-bottom:10px; text-align:left; font-size:1rem;" />
        <label style="color:#5b6ea8; font-size:0.72rem;">URL (opcional)</label>
        <input id="modal-url" class="num-input" type="text" placeholder="https://..." style="width:100%; margin-bottom:16px; text-align:left; font-size:1rem;" />
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="modal-cancel" class="btn" style="background:rgba(255,59,92,0.15); color:#ff3b5c; border:1px solid rgba(255,59,92,0.35); padding:8px 16px; border-radius:6px;">Cancelar</button>
            <button id="modal-save" class="btn btn-primary" style="background:linear-gradient(135deg,#4a7cff,#7c3bff); color:#fff; padding:8px 16px; border-radius:6px; border:none;">Guardar</button>
        </div>
    </div>
</div>

<script src="predictor.js"></script>
<script src="app.js"></script>
</body>
</html>
