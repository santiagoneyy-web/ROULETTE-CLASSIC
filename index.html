<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ROULETTE PREDICTOR PRO</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">

    <!-- ═══ TOP BAR ═══ -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="app-logo">🎰</span>
            <span class="app-title">ROULETTE PRO</span>
        </div>
        <div class="top-bar-right">
            <select id="table-select" class="compact-select"></select>
            <span class="live-clock" id="live-clock">00:00:00</span>
        </div>
    </header>

    <!-- ═══ VISUAL PANEL (Wheel + Mini History) ═══ -->
    <section class="visual-panel-mini">
        <div class="wheel-container">
            <canvas id="wheel-canvas" width="130" height="130"></canvas>
        </div>
        <div id="history-strip-mini" class="history-strip-mini">
            <!-- Last 15 numbers (ball style) -->
        </div>
    </section>

    <!-- ═══ AGENT TABS ═══ -->
    <nav class="agent-tab-bar" id="strat-tabs"></nav>

    <!-- ═══ AGENT CARD ═══ -->
    <section class="agent-card" id="agent-card">
        <div class="agent-card-header">
            <span class="agent-icon">🤖</span>
            <span class="agent-card-name" id="active-agent-name">ANDROID N17</span>
            <button id="btn-celula-invert" style="display:none; background: var(--accent); color:#000; border:none; border-radius:10px; padding: 2px 8px; font-weight:bold; cursor:pointer; font-size:10px; margin-left: auto; margin-right: 10px;" onclick="toggleCelulaInvert()">INVERSO 🔄</button>
            <span class="agent-confidence" id="agent-confidence">0%</span>
        </div>

        <div class="agent-strategy-label" id="agent-strategy">--</div>

        <!-- Wheel dots (visual flair) -->
        <div class="wheel-dots">
            <span class="wd"></span><span class="wd"></span><span class="wd"></span>
        </div>

        <div class="agent-status-row" id="agent-status-row">
            <span class="status-line" id="agent-status">BUSCANDO EN BASE DE DATOS...</span>
        </div>
        <div class="agent-sync-row" id="agent-sync">SINCRONIZANDO BDD...</div>

        <!-- 3-Column Prediction Grid -->
        <div class="prediction-grid-3" id="prediction-grid">
            <div class="p-box pb-left">
                <span class="p-label">SMALL</span>
                <span class="p-val" id="psn-small-val">--</span>
                <span class="p-sub">n4</span>
            </div>
            <div class="p-box pb-center">
                <div class="p-val-main" id="target-number">--</div>
                <div class="p-sub-main" id="pi-radius">n9</div>
                <div class="p-tendency" id="pi-tendency">TENDENCIA: --</div>
            </div>
            <div class="p-box pb-right">
                <span class="p-label">BIG</span>
                <span class="p-val" id="psn-big-val">--</span>
                <span class="p-sub">n4</span>
            </div>
        </div>

        <div class="agent-footer-stats">
            <span class="st">W:<span id="agent-wins">0</span> L:<span id="agent-losses">0</span></span>
            <span class="status-msg" id="agent-status-msg">SOPORTE BIG N9</span>
        </div>

        <!-- Long-form performance string (WWLL...) -->
        <div class="performance-string" id="agent-performance">
            <!-- Filled by JS -->
        </div>
    </section>

    <!-- ═══ TRAVEL DATA ═══ -->
    <section class="travel-section">
        <div class="travel-top-bar">
            <span class="section-title">📊 TRAVEL DATA</span>
            <div class="travel-badges">
                <span class="badge badge-stable" id="travel-pattern">ESTABLE</span>
                <span class="badge badge-zone" id="travel-last-zone">LAST: --</span>
            </div>
        </div>
        <div class="travel-table-wrap">
            <table class="travel-table">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>DIST</th>
                        <th>DIR</th>
                        <th>PHASE</th>
                    </tr>
                </thead>
                <tbody id="travel-tbody">
                    <tr><td colspan="4" class="muted">Selecciona una mesa...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script src="predictor.js?v=5"></script>
<script src="app.js?v=5"></script>
</body>
</html>
