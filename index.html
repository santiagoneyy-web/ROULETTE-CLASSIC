<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>CLASI ROULETTE</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">

    <!-- ═══ TOP BAR ═══ -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="app-logo">🎰</span>
            <span class="app-title">CLASI ROULETTE</span>
        </div>
        <div class="top-bar-right">
            <select id="table-select" class="compact-select"></select>
            <span class="live-clock" id="live-clock">00:00:00</span>
        </div>
    </header>

    <!-- ═══ TWO-COLUMN BODY ═══ -->
    <div class="two-col-body">

        <!-- ── LEFT COLUMN ── -->
        <div class="col-left">

            <!-- Visual Panel (Table Image + Mini History) -->
            <section class="visual-panel-mini">
                <div class="table-image-container" style="text-align: center; margin-bottom: 10px;">
                    <!-- Coloca tu foto en la misma carpeta del proyecto y llámala "table.jpg" -->
                    <img src="table.jpg" alt="Mesa de Ruleta" style="width: 100%; max-width: 250px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
                </div>
                <div id="history-strip-mini" class="history-strip-mini"></div>
            </section>

            <!-- Prediction Panel -->
            <section class="shadow-panel" id="prediction-panel">
                <!-- Header row: title + side switch together -->
                <div class="agent-card-header">
                    <span class="agent-icon">🤖</span>
                    <span class="agent-card-name">ANDROID 1717</span>
                    <span class="side-badge" id="pred-dir">CW ↺</span>
                    <button id="btn-switch-side" class="btn-switch-inline">⇄</button>
                </div>

                <div class="agent-strategy-label" id="agent-strategy">DISTANCE 10 · N9</div>

                <!-- 3-Column Prediction Grid -->
                <div class="prediction-grid-3" id="prediction-grid">
                    <div class="p-box pb-left">
                        <span class="p-label">SMALL</span>
                        <span class="p-val" id="psn-small-val">--</span>
                        <span class="p-sub">n4</span>
                        <span class="hit-text" id="hit-small"></span>
                    </div>
                    <div class="p-box pb-center">
                        <div class="p-val-main" id="target-number">--</div>
                        <div class="p-sub-main">n9</div>
                        <div class="p-tendency" id="pi-tendency">MAIN PRED.</div>
                    </div>
                    <div class="p-box pb-right">
                        <span class="p-label">BIG</span>
                        <span class="p-val" id="psn-big-val">--</span>
                        <span class="p-sub">n4</span>
                        <span class="hit-text" id="hit-big"></span>
                    </div>
                </div>

                <!-- W/L Stats (Last 12) -->
                <div class="agent-footer-stats">
                    <span class="st">LAST 12 ➔ W:<span id="agent-wins">0</span> L:<span id="agent-losses">0</span></span>
                    <span class="status-msg">RATE: <span id="w-rate">0.00%</span></span>
                </div>
                
                <!-- Recent streak -->
                <div class="performance-string" id="agent-performance"></div>

            </section>

        </div><!-- /col-left -->

        <!-- ── RIGHT COLUMN ── -->
        <div class="col-right">
            <section class="travel-section">
                <div class="travel-top-bar">
                    <span class="section-title">📊 TRAVEL DATA</span>
                    <div class="travel-badges">
                        <span class="badge badge-stable" id="travel-pattern">ESTABLE</span>
                        <span class="badge badge-zone" id="travel-last-zone">LAST: --</span>
                    </div>
                </div>
                <!-- Travel Chart Canvas -->
                <div class="chart-wrap">
                    <canvas id="travelChart" height="130"></canvas>
                </div>
                <div class="travel-table-wrap">
                    <table class="travel-table">
                        <thead>
                            <tr>
                                <th>NUM</th>
                                <th>DIST</th>
                                <th>DIR</th>
                                <th>ZONE</th>
                            </tr>
                        </thead>
                        <tbody id="travel-tbody">
                            <tr><td colspan="4" class="muted">Selecciona una mesa...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div><!-- /col-right -->

    </div><!-- /two-col-body -->

</div>

<script src="predictor.js?v=8"></script>
<script src="app.js?v=8"></script>
</body>
</html>
