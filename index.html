<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>CLASI ROULETTE</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="resizable-wrapper">
<div class="app-shell">
    <div class="three-col-body">
         <div class="col-visual">
             <section class="visual-panel-mini">
                 <div class="table-image-container">
                     <img src="table-1.jpg" alt="Mesa de Ruleta">
                 </div>
                 <div id="history-strip-mini" class="history-strip-mini"></div>
                 <div class="number-input-row" style="display:flex; gap:4px; margin-top:4px;">
                     <input type="number" id="number-input" min="0" max="36" placeholder="Numero 0-36" style="flex:1; background:#111; border:1px solid #333; color:var(--accent); padding:4px 8px; border-radius:4px; font-size:12px;">
                     <button onclick="submitNumber(document.getElementById('number-input').value)" style="background:rgba(0,229,200,0.15); border:1px solid var(--accent); color:var(--accent); padding:4px 12px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:700;">ENVIAR</button>
                     <button onclick="wipeData()" style="background:rgba(255,80,80,0.15); border:1px solid #f55; color:#f55; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:10px;">WIPE</button>
                 </div>
             </section>
 
            <div class="strategy-tabs">
                <button class="tab-btn active" id="tab-btn-dir">DIR</button>
                <button class="tab-btn" id="tab-btn-scatter">DIR CHART</button>
                <button class="tab-btn" id="tab-btn-analisis">ANALISIS</button>
                <button class="tab-btn" id="tab-btn-chat">CHAT</button>
            </div>

            <!-- DIR Panel -->
            <section class="shadow-panel" id="panel-dir">
                <div class="dual-block">
                    <div class="prediction-grid-3">
                        <div class="p-box pb-left">
                            <span class="p-label">UNDER</span>
                            <div class="val-row">
                                <span class="p-val" id="dir-cw-l-val">--</span><sup class="p-power">n4</sup>
                                <span class="hit-text" id="dir-cw-l-hit"></span>
                            </div>
                        </div>
                        <div class="p-box pb-center">
                            <div class="val-row-main">
                                <div class="p-val-main" id="dir-cw-c-val">--</div><sup class="p-power">n9</sup>
                            </div>
                            <div class="p-sub-main">DIR CW</div>
                        </div>
                        <div class="p-box pb-right">
                            <span class="p-label">OVER</span>
                            <div class="val-row">
                                <span class="p-val" id="dir-cw-r-val">--</span><sup class="p-power">n4</sup>
                                <span class="hit-text" id="dir-cw-r-hit"></span>
                            </div>
                        </div>
                    </div>
                    <div class="agent-footer-stats">
                        <span>W:<span id="dir-cw-w">0</span> L:<span id="dir-cw-l">0</span></span>
                        <span id="dir-cw-rate">0.0%</span>
                        <span id="dir-cw-perf">--</span>
                    </div>
                </div>

                <div class="dual-block" style="border-top: 1px solid rgba(0,229,200,0.15);">
                    <div class="prediction-grid-3">
                        <div class="p-box pb-left">
                            <span class="p-label">UNDER</span>
                            <div class="val-row">
                                <span class="p-val" id="dir-ccw-l-val">--</span><sup class="p-power">n4</sup>
                                <span class="hit-text" id="dir-ccw-l-hit"></span>
                            </div>
                        </div>
                        <div class="p-box pb-center">
                            <div class="val-row-main">
                                <div class="p-val-main" id="dir-ccw-c-val">--</div><sup class="p-power">n9</sup>
                            </div>
                            <div class="p-sub-main">DIR CCW</div>
                        </div>
                        <div class="p-box pb-right">
                            <span class="p-label">OVER</span>
                            <div class="val-row">
                                <span class="p-val" id="dir-ccw-r-val">--</span><sup class="p-power">n4</sup>
                                <span class="hit-text" id="dir-ccw-r-hit"></span>
                            </div>
                        </div>
                    </div>
                    <div class="agent-footer-stats">
                        <span>W:<span id="dir-ccw-w">0</span> L:<span id="dir-ccw-l">0</span></span>
                        <span id="dir-ccw-rate">0.0%</span>
                        <span id="dir-ccw-perf">--</span>
                    </div>
                </div>
            </section>

            <!-- SCATTER CHART -->
            <section class="shadow-panel" id="panel-scatter" style="display: none;">
                <div class="agent-card-header">
                    <span class="agent-icon">📊</span>
                    <span class="agent-card-name">DIR CHART</span>
                </div>
                <div style="padding: 4px 8px;">
                    <canvas id="scatterChart" height="200"></canvas>
                </div>
            </section>

            <!-- ANALISIS -->
             <section class="shadow-panel" id="panel-analisis" style="display: none;">
                 <div class="agent-card-header">
                     <span class="agent-icon">📊</span>
                     <span class="agent-card-name">SPIN METHOD</span>
                     <button id="btn-analisis-run" onclick="runSpinAnalysis()">EJECUTAR</button>
                 </div>
                 <div id="analisis-content">
                     <div id="analisis-status">Cargando analisis...</div>
                     <div id="analisis-global" style="display:none;">
                         <div style="display:flex; gap:12px; align-items:center; margin:4px 0;">
                             <span id="analisis-rate" style="font-size:1.4rem; font-weight:900; color:#0f0;">--</span>
                             <span id="analisis-counts" style="font-size:9px; color:var(--text-dim);">--</span>
                         </div>
                         <div id="analisis-golden" style="margin:4px 0;"></div>
                     </div>
                     <div id="analisis-analyst"></div>
                     <div id="analisis-sniper"></div>
                 </div>
             </section>

            <!-- CHAT -->
            <section class="shadow-panel" id="panel-chat" style="display: none;">
                <div class="agent-card-header">
                    <span class="agent-icon">💬</span>
                    <span class="agent-card-name">CHAT</span>
                </div>
                <div id="chat-messages"></div>
                <div class="chat-input-row">
                    <input id="chat-input" type="text" placeholder="Escribe..." onkeydown="if(event.key==='Enter')sendChatMessage()">
                    <button onclick="sendChatMessage()">Enviar</button>
                </div>
            </section>

            <!-- MASTER SNIPER -->
            <section class="master-panel">
                <div class="master-header">
                    <span class="master-icon">🎯</span>
                    <span class="master-name">SNIPER MASTER</span>
                    <div class="master-conf-bar"><div class="master-conf-fill" id="master-conf-fill"></div></div>
                    <span class="master-conf-text" id="master-conf-text">0%</span>
                </div>
                <div class="master-body">
                    <div class="master-main-signal" id="master-signal">SYNCHRONIZING...</div>
                    <div class="master-details">
                        <span class="master-target-badge" id="master-target">--</span>
                        <span class="master-reason-text" id="master-reason">--</span>
                    </div>
                </div>
                <div class="master-footer">
                    <span id="master-rate">0%</span>
                    <span id="master-perf">--</span>
                </div>
            </section>

            <!-- ANALYST BOX -->
            <div class="analyst-box" id="analyst-panel">
                <div class="analyst-header">
                    <span class="analyst-tag">📈 ANALYST</span>
                    <span id="analyst-rate">0%</span>
                </div>
                <div class="analyst-main">
                    <span class="analyst-signal" id="analyst-signal">ANALIZANDO...</span>
                    <div class="analyst-decision">
                        <span class="dir-badge" id="analyst-dir">--</span>
                        <span class="mag-badge" id="analyst-size">--</span>
                    </div>
                </div>
                <div class="analyst-reason" id="analyst-reason">-</div>
            </div>
         </div>
  
         <div class="col-travel">
            <section class="travel-section">
                <div class="travel-top-bar">
                    <span>📊 TRAVEL</span>
                    <select id="table-select"></select>
                </div>
                <canvas id="travelChart" height="140"></canvas>
                <div class="travel-table-wrap">
                    <table>
                        <thead>
                            <tr><th>N</th><th>D</th><th>DIR</th><th>ZON</th></tr>
                        </thead>
                        <tbody id="travel-tbody"></tbody>
                    </table>
                </div>
            </section>
         </div>
     </div>
</div>
</div>

<script src="predictor.js"></script>
<script src="app.js"></script>
</body>
</html>
