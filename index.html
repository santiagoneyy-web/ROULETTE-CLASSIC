<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ROULETTE PREDICTOR PRO</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">

    <!-- ═══ TOP BAR ═══ -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="app-logo">🎰</span>
            <span class="app-title">ROULETTE PRO</span>
        </div>
        <div class="top-bar-right">
            <select id="table-select" class="compact-select"></select>
            <span class="live-clock" id="live-clock">00:00:00</span>
        </div>
    </header>

    <!-- ═══ VISUAL PANEL (Wheel + Mini History) ═══ -->
    <section class="visual-panel-mini">
        <div class="wheel-container">
            <canvas id="wheel-canvas" width="130" height="130"></canvas>
        </div>
        <div id="history-strip-mini" class="history-strip-mini">
            <!-- Last 15 numbers (ball style) -->
        </div>
    </section>

    <!-- ═══ PREDICTION PANEL ═══ -->
    <section class="shadow-panel" id="prediction-panel">
        <div class="panel-header">
            <span class="icon">🤖</span> PREDICTION
        </div>
        
        <div class="panel-body">
            <div class="pred-line">Prediction: <strong id="pred-target" class="highlight-val">--</strong> <span class="w-rate">[W-RATE: <span id="w-rate">0.00%</span>]</span></div>
            <div class="pred-line">W/L Streak: <span id="wl-streak" class="streak-text">--</span></div>
            <div class="pred-line">Pattern Predicted next: <span id="pattern-next">--</span></div>
            <div class="pred-line">Avg. used 10</div>
            <div class="pred-line">Direction: <span id="pred-dir">CW</span></div>
            <div class="pred-line">Spins: <span id="pred-spins">0</span></div>
            
            <div class="dropdown-header">▼ SHOW TOP NUMBERS</div>
            <div class="top-numbers">
                <div class="top-line">TOP (CW): <span id="top-cw" class="highlight-val">--</span> <span class="n4-tag">n4</span></div>
                <div class="top-line">TOP (CCW): <span id="top-ccw" class="highlight-val">--</span> <span class="n4-tag">n4</span></div>
            </div>
            
            <div class="panel-actions">
                <button id="btn-switch-side" class="btn-shadow">SWITCH SIDE</button>
            </div>
        </div>
    </section>

    <!-- ═══ TRAVEL DATA ═══ -->
    <section class="travel-section">
        <div class="travel-top-bar">
            <span class="section-title">📊 TRAVEL DATA</span>
            <div class="travel-badges">
                <span class="badge badge-stable" id="travel-pattern">ESTABLE</span>
                <span class="badge badge-zone" id="travel-last-zone">LAST: --</span>
            </div>
        </div>
        <div class="travel-table-wrap">
            <table class="travel-table">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>DIST</th>
                        <th>DIR</th>
                        <th>PHASE</th>
                    </tr>
                </thead>
                <tbody id="travel-tbody">
                    <tr><td colspan="4" class="muted">Selecciona una mesa...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script src="predictor.js?v=5"></script>
<script src="app.js?v=5"></script>
</body>
</html>
