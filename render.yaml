services:
  - type: web
    name: roulette-classic
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run stack:render
    envVars:
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        fromSecret: mongodb_uri
      - key: LLM_PROVIDER
        value: "groq"
      - key: GROQ_API_KEY
        fromSecret: groq_api_key
    autoDeploy: true
    healthCheckPath: "/"
