services:
  - type: web
    name: roulette-classic
    env: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm run stack:render
    envVars:
      - key: PORT
        value: "10000"
      - key: GEMINI_API_KEY
        fromSecret: gemini_api_key
    autoDeploy: true
    healthCheckPath: "/"
